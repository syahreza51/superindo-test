services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-superindo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-superindo}
      POSTGRES_DB: ${DB_NAME:-superindo}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-superindo} -d ${DB_NAME:-superindo}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://${DB_USER:-superindo}:${DB_PASSWORD:-superindo}@postgres:5432/${DB_NAME:-superindo}?sslmode=disable",
        "up"
      ]

  seed:
    image: postgres:16-alpine
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PGPASSWORD: ${DB_PASSWORD:-superindo}
    volumes:
      - ./seed:/seed:ro
    command:
      [
        "sh", "-c",
        "psql -h postgres -U ${DB_USER:-superindo} -d ${DB_NAME:-superindo} -f /seed/seed.sql"
      ]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  pgdata:

